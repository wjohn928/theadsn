[build]
  publish = "."
  functions = "netlify/functions"

# Redirect beehiiv newsletter routes to beehiiv's hosting
[[redirects]]
  from = "/p/*"
  to = "https://adsn.beehiiv.com/p/:splat"
  status = 302
  force = true

[[redirects]]
  from = "/subscribe"
  to = "https://adsn.beehiiv.com/subscribe"
  status = 302
  force = true

[[redirects]]
  from = "/unsubscribe"
  to = "https://adsn.beehiiv.com/unsubscribe"
  status = 302
  force = true

[[redirects]]
  from = "/confirm"
  to = "https://adsn.beehiiv.com/confirm"
  status = 302
  force = true
