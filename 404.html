<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADSN — Redirecting...</title>
  <style>
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 500px; padding: 2rem; }
    a { color: #3B82F6; }
  </style>
  <script>
    (function() {
      var path = window.location.pathname;
      var beehiivRoutes = ['/p/', '/subscribe', '/unsubscribe', '/confirm'];
      var isBeehiivRoute = beehiivRoutes.some(function(route) {
        return path.startsWith(route);
      });
      if (isBeehiivRoute) {
        window.location.replace('https://theadsn.beehiiv.com' + path + window.location.search);
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. <a href="/">Go back to ADSN</a>.</p>
  </div>
</body>
</html>
